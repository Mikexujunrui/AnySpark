modules:
  - name: 对话界面模块
    layer: 用户层
    type: frontend
    responsibilities:
      - 提供聊天式交互界面
      - 消息内嵌可视化组件（知识卡片、角色卡等）
      - 管理对话历史与状态
    interfaces:
      - name: sendMessage
        description: 发送聊天消息
        input: "{ text, attachments, projectId }"
        output: "{ messageId, timestamp }"
      - name: onAgentMessage
        description: 接收Agent流式回复
        input: "Stream<{ textChunk, embeddedCards, actions }>"
        output: void
    dependencies: []
    difficulty: 中等
    estimated_effort: 10 人天
    notes: 重点在消息中嵌入可视化组件的架构设计

  - name: 可视化仪表盘模块
    layer: 用户层
    type: frontend
    responsibilities:
      - Wiki式知识条目查看/编辑
      - 角色卡展示
      - 时间线事件分布
      - 4D世界地图（地理+时间维度）
      - 知识图谱力导向图
      - 伏笔→回收追踪看板
    sub_components:
      - WikiViewer
      - CharacterCard
      - TimelineView
      - WorldMap
      - KnowledgeGraph
      - ForeshadowBoard
    interfaces:
      - name: getEntity
        input: "{ entityId }"
        output: "Entity"
      - name: getTimeline
        input: "{ projectId, filters }"
        output: "TimelineEvent[]"
      - name: getGraph
        input: "{ projectId, depth }"
        output: "{ nodes, edges }"
    dependencies: [知识库管理器]
    difficulty: 中等
    estimated_effort: 15 人天
    notes: 可分期交付，MVP阶段先出WikiViewer和CharacterCard

  - name: 知识抽取Agent
    layer: AI层
    type: ai_agent
    responsibilities:
      - 从对话文本中识别实体、关系、事件
      - 从上传文档中批量提取知识
      - 检测伏笔/模糊表述
      - 生成知识变更提案（非直接写入）
    capabilities:
      - entity_recognition
      - relationship_extraction
      - event_extraction
      - foreshadowing_detection
    interfaces:
      - name: extractFromText
        input: "{ text, context }"
        output: "KnowledgeProposal[]"
      - name: extractFromDocument
        input: "{ documentId }"
        output: "KnowledgeProposal[]"
      - name: suggestKnowledge
        input: "{ projectId, trigger }"
        output: "KnowledgeProposal[]"
    dependencies: [LLM网关, 知识库管理器, 一致性校验Agent]
    difficulty: 困难
    estimated_effort: 15 人天
    notes: 核心难点在于LLM抽取的准确率，需设计多轮校验

  - name: 上下文管理器
    layer: 业务层
    type: backend_service
    responsibilities:
      - 为写作Agent构建最优上下文
      - 知识检索（图查询+语义检索）
      - Token预算管理与裁剪
      - 生成的知识约束prompt
      - 生成后一致性校验
    interfaces:
      - name: buildWritingContext
        input: "{ task, projectId, constraints }"
        output: "PromptContext"
      - name: validateAgainstKnowledge
        input: "{ text, knowledgeRefs }"
        output: "ValidationResult"
    dependencies: [知识图谱（Neo4j）, SQLite FTS5]
    difficulty: 困难
    estimated_effort: 10 人天
    notes: 核心组件，决定"知识约束写作"能否真正落地

  - name: 写作Agent
    layer: AI层
    type: ai_agent
    responsibilities:
      - 在知识约束下生成小说正文
      - 支持强弱两种约束模式
      - 改写/扩写/缩写已有内容
    modes:
      - strict: 严格基于知识库写作
      - suggest: 可补充但标记待确认
    interfaces:
      - name: write
        input: "{ context, instruction, mode }"
        output: "Stream<TextChunk>"
      - name: rewrite
        input: "{ text, instruction, context }"
        output: "Stream<TextChunk>"
      - name: expand
        input: "{ text, targetLength, context }"
        output: "Stream<TextChunk>"
    dependencies: [上下文管理器, LLM网关, 一致性校验Agent]
    difficulty: 困难
    estimated_effort: 12 人天

  - name: 工作流Agent
    layer: AI层
    type: ai_agent
    responsibilities:
      - 通过对话理解用户意图
      - 自动生成/修改写作工作流定义
    interfaces:
      - name: generateWorkflow
        input: "{ userIntent, projectContext }"
        output: "WorkflowDefinition"
      - name: modifyWorkflow
        input: "{ workflowId, changeRequest }"
        output: "WorkflowDefinition"
    dependencies: [LLM网关, 工作流执行引擎]
    difficulty: 困难
    estimated_effort: 12 人天
    notes: 本质是meta-agent，需要LLM有很强的工具调用能力

  - name: 知识库管理器
    layer: 业务层
    type: backend_service
    responsibilities:
      - 知识实体CRUD
      - 版本追踪
      - 关联查询与图遍历
      - 冲突检测
    interfaces:
      - name: createEntity
        input: "Entity"
        output: "Entity"
      - name: queryEntity
        input: "{ id | name | type }"
        output: "Entity"
      - name: getRelated
        input: "{ entityId, relationTypes, depth }"
        output: "{ entities, relations }"
    dependencies: [Neo4j, JSON 文件存储]
    difficulty: 中等
    estimated_effort: 8 人天

  - name: 项目/章节管理器
    layer: 业务层
    type: backend_service
    responsibilities:
      - 小说项目CRUD
      - 章节管理（增删改排序）
      - 版本历史（pygit2）
      - 导出（txt/docx/md）
    interfaces:
      - name: createProject
        input: "{ title, description }"
        output: "Project"
      - name: manageChapter
        input: "{ projectId, action, data }"
        output: "Chapter"
      - name: export
        input: "{ projectId, format }"
        output: "FileStream"
    dependencies: [JSON 文件存储]
    difficulty: 简单
    estimated_effort: 5 人天

  - name: LLM网关
    layer: AI层支撑
    type: backend_service
    responsibilities:
      - 统一多模型接入
      - 请求限流与排队
      - 重试与回退策略
      - Token用量统计
    supported_models:
      - DeepSeek (v4-pro / v4-flash)
      - 任何 OpenAI 兼容 API
    interfaces:
      - name: chat
        input: "{ model, messages, tools, stream }"
        output: "Stream<LLMChunk>"
      - name: getUsage
        input: "{ projectId, dateRange }"
        output: "TokenUsage"
    dependencies: [外部 LLM API（DeepSeek / OpenAI 兼容）]
    difficulty: 中等
    estimated_effort: 5 人天

  - name: 工作流执行引擎
    layer: 业务层
    type: backend_service
    responsibilities:
      - 解析工作流JSON定义
      - 按序/条件/并行调用Agent
      - 工作流状态追踪
      - 断点续执行
    interfaces:
      - name: execute
        input: "{ workflowId, input }"
        output: "Stream<WorkflowEvent>"
      - name: getStatus
        input: "{ executionId }"
        output: "WorkflowStatus"
    dependencies: [所有AI Agent]
    difficulty: 中等
    estimated_effort: 8 人天

  - name: 文档解析器
    layer: 业务层
    type: backend_service
    responsibilities:
      - 支持txt/docx/md/pdf格式上传
      - 文本提取与分块
      - 大文档分段处理
    interfaces:
      - name: parseDocument
        input: "{ file, projectId }"
        output: "DocumentChunk[]"
    dependencies: [文件系统]
    difficulty: 简单
    estimated_effort: 3 人天

  - name: 一致性校验Agent
    layer: AI层
    type: ai_agent
    responsibilities:
      - 检测新知识与已有知识的冲突
      - 检测写作内容与知识库的不一致
      - 生成冲突报告供用户确认
    interfaces:
      - name: checkProposal
        input: "{ proposal, existingKnowledge }"
        output: "ConflictReport"
      - name: checkGeneratedText
        input: "{ text, knowledgeRefs }"
        output: "ConsistencyReport"
    dependencies: [LLM网关, 知识库管理器]
    difficulty: 中等
    estimated_effort: 6 人天

  - name: 剧情规划Agent
    layer: AI层
    type: ai_agent
    responsibilities:
      - 根据当前知识库状态提供剧情走向选项
      - 分析伏笔回收时机
      - 生成多分支剧情选择
    interfaces:
      - name: suggestPlotDirections
        input: "{ projectId, currentChapter }"
        output: "PlotSuggestion[]"
    dependencies: [LLM网关, 知识库管理器]
    difficulty: 中等
    estimated_effort: 6 人天

  - name: 编辑Agent
    layer: AI层
    type: ai_agent
    responsibilities:
      - 润色/扩写/缩写已有文本
      - 风格一致性调整
    interfaces:
      - name: polish
        input: "{ text, instruction }"
        output: "string"
    dependencies: [LLM网关, 上下文管理器]
    difficulty: 中等
    estimated_effort: 5 人天

  - name: 拆书复写工具集
    layer: AI层
    type: ai_agent
    responsibilities:
      - 章节拆解为场景和情节节拍(decompose_chapter)
      - 文风特征分析(extract_style)
      - 基于情节大纲复写章节(reconstruct_chapter)
      - 原文vs复写情节对比(compare_plot)
      - 字数统计(count_words)
    dependencies: [LLM网关, 知识库管理器]
    difficulty: 中等
    estimated_effort: 5 人天
    status: implemented

  - name: 评审团系统
    layer: AI层+业务层
    type: ai_agent
    responsibilities:
      - 多维度章节评审（专业审稿人+读者代言人并发评审）
      - 评审员人设管理（预设+自定义，支持激活/停用）
      - 评审结果汇总（综合报告+个人详细反馈）
      - 评审历史存储与查看
    sub_components:
      - ReviewerRegistry: 从 reviewers/*.yaml 加载评审员人设
      - ReviewPanel: 编排层，并发/串行执行控制
      - ReviewSummarizer: 汇总Agent，整合评审意见
    preset_reviewers:
      - { id: screenwriter, name: 编剧, category: professional }
      - { id: literary_editor, name: 文学编辑, category: professional }
      - { id: logic_checker, name: 逻辑审校, category: professional }
      - { id: power_fantasy_reader, name: 爽文读者, category: reader }
      - { id: emotional_reader, name: 情感型读者, category: reader }
      - { id: hardcore_reader, name: 硬核党, category: reader }
      - { id: harsh_critic, name: 挑刺王, category: reader }
      - { id: casual_reader, name: 休闲读者, category: reader }
    interfaces:
      - name: run_review
        description: 启动评审团评审指定章节
        input: "{ chapter, reviewers?, mode? }"
        output: "ReviewReport"
      - name: manage_reviewers
        description: 管理评审员（列表/激活/停用/添加/删除）
        input: "{ action, reviewer_id?, name?, persona? }"
        output: "string"
    dependencies: [LLM网关, 知识库管理器, JSON存储]
    difficulty: 中等
    estimated_effort: 8 人天
    status: implemented

  - name: 剧情卡片系统
    layer: AI层+用户层
    type: interactive
    responsibilities:
      - 在剧情规划时生成多个走向选项卡片
      - 阻塞等待用户选择（选卡片/自定义/拒绝）
      - 将用户选择反馈给Agent继续创作
    interfaces:
      - name: suggest_plot_directions
        description: 生成剧情走向卡片供用户选择
        input: "{ instruction, chapter_ref?, num_options? }"
        output: "{ type: plot_cards, cards: [...] } → 阻塞等待用户选择 → string"
    dependencies: [LLM网关, 知识库管理器, 大纲系统, question_manager]
    difficulty: 中等
    estimated_effort: 4 人天
    status: implemented

  - name: 联网搜索系统
    layer: AI层+工具层
    type: ai_agent
    responsibilities:
      - 通过 MCP JSON-RPC 2.0 调用 Exa/Parallel 搜索引擎
      - 抓取网页内容并提取纯文本
      - Session 级 A/B 分流选择搜索后端
      - 支持 research 子 Agent 进行多轮深度调研
    interfaces:
      - name: web_search
        description: 联网搜索写作素材
        input: "{ query, num_results? }"
        output: "string（搜索结果文本）"
      - name: web_fetch
        description: 抓取网页文本内容
        input: "{ url, format?, timeout? }"
        output: "string（页面纯文本）"
    sub_components:
      - MCP_Client: JSON-RPC 2.0 over HTTP（Exa + Parallel 双后端）
      - TextExtractor: HTML → 纯文本转换（stdlib html.parser）
      - ProviderSelector: hash(book_id) % 2 A/B 分流
    dependencies: [httpx, config]
    difficulty: 中等
    estimated_effort: 3 人天
    status: implemented
