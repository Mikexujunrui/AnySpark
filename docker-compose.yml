version: "3.8"

services:
  neo4j:
    image: neo4j:5-community
    container_name: novel-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-novel_agent_2024!}
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/mikexujunrui/anyspark-backend:${TAG:-latest}
    container_name: novel-backend
    ports:
      - "8191:8191"
    environment:
      SERVER_PORT: "8191"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      LLM_MODE: ${LLM_MODE:-split}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-novel_agent_2024!}
      EXA_API_KEY: ${EXA_API_KEY:-}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      WEBSEARCH_PROVIDER: ${WEBSEARCH_PROVIDER:-}
      WEBSEARCH_ENABLED: ${WEBSEARCH_ENABLED:-true}
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    image: ghcr.io/mikexujunrui/anyspark-frontend:${TAG:-latest}
    container_name: novel-frontend
    ports:
      - "8190:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
