# 开发覆盖文件：本地构建镜像而非拉取预构建镜像
# 用法：docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./data:/app/data
      - ./plugins:/app/plugins
      - ./skills:/app/skills
      - ./styles:/app/styles
      - ./reviewers:/app/reviewers

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
