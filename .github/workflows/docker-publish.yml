name: Publish Docker Images

# 当推送 v* 标签（如 v1.0.0）时，自动构建 backend/frontend 镜像并推送到 GHCR
# 镜像地址：ghcr.io/mikexujunrui/anyspark-backend  /  anyspark-frontend
on:
  push:
    tags:
      - 'v*'
  # 手动触发：在 GitHub Actions 页面点 "Run workflow"，输入版本号
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)，用于手动触发镜像构建'
        required: true
        default: 'v1.0.0'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # GHCR 要求镜像名全小写
      - name: Lowercase owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Extract version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/anyspark-backend:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/anyspark-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/anyspark-frontend:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/anyspark-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
