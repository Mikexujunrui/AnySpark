server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Connection diagnostics: custom log format ──
    # Rrecords request duration, status, and upstream timing for SSE debugging.
    log_format conn_diag '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct="$upstream_connect_time" '
        'urt="$upstream_response_time" '
        'connection=$connection '
        'sse=$http_accept';

    access_log /var/log/nginx/access.log conn_diag;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression for better mobile performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # API proxy to backend (FastAPI)
    location /api {
        proxy_pass http://backend:8191;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (critical for streaming agent responses)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;

        # SSE-specific headers
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (vite builds with content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
